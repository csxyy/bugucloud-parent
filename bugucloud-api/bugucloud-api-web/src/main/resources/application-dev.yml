server:
  port: 8080

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver  # MySQL8 驱动（必须带 cj）
    url: jdbc:mysql://192.168.0.200:3306/bugucloud?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    hikari:   # 自带HikariCP连接池配置
      maximum-pool-size: 10  # 最大连接数
      minimum-idle: 5       # 最小空闲连接
      idle-timeout: 30000   # 空闲超时时间
  data:
    redis:
      host: 192.168.0.200
      port: 6379
      password: 123456
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16        # 最大连接数
          max-idle: 8           # 最大空闲连接
          min-idle: 4           # 最小空闲连接
          max-wait: 2000ms      # 获取连接的最大等待时间
        shutdown-timeout: 100ms # 关闭超时
  mail:
    host: smtp.qq.com
    port: 465
    username: 3025267039@qq.com # 你的QQ邮箱，如 123456@qq.com
    password: jztlwjfaoudddhba  # 你的QQ邮箱SMTP授权码，不是登录密码
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: true
          # 超时设置
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 5000


knife4j:
  enable: true               # 开启增强功能
  production: false          # 生产环境设为 true（关闭文档）
  setting:
    language: zh-CN          # 中文界面
springdoc:
  api-docs:
    enabled: true            # 开启 OpenAPI 文档生成
